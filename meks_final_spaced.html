<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
<title>Карта цифровизации МЭКС</title>
<link rel="stylesheet" href="meks_final_spaced.css">
</head>
<body>
<div class="page">


<div id="globalStatsBar" class="stats-bar global-stats-bar" aria-label="Общий счетчик задач"></div>

<div class="mm-shell">

<div class="mm-stage">
<svg id="mm" viewBox="0 0 448 762" width="448" style="display:block;min-width:392px;"></svg>
</div>


<div id="modalOverlay" class="modal-overlay" onclick="if(event.target===this){closeD();}">
  <div id="dpanel" role="dialog" aria-modal="true" aria-labelledby="dtop">
    <div class="detail-toolbar" role="group" aria-label="Размер текста в карточках">
      <label for="detailFontRange" class="detail-toolbar-label">Размер текста</label>
      <input id="detailFontRange" class="detail-font-range" type="range" min="95" max="140" step="5" value="100" aria-label="Ползунок изменения размера текста" oninput="setDetailScale(this.value / 100)">
      <span id="detailScaleValue" class="detail-scale-value">100%</span>
      <button type="button" class="detail-toolbar-close" aria-label="Закрыть окно" onclick="closeD()">×</button>
    </div>
    <div class="detail-scroll">
      <div id="dtop" style="font-size:12px;font-weight:500;color:var(--color-text-primary);padding:8px 10px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);margin-bottom:8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;"></div>
      <div id="taskStatsBar" class="stats-bar task-stats-bar"></div>
      <div id="det-grid"></div>
    </div>
  </div>
</div>


<div id="statusModalOverlay" class="modal-overlay" onclick="if(event.target===this){closeStatusModal();}">
  <div id="statusPanel" class="status-panel" role="dialog" aria-modal="true" aria-labelledby="statusModalTitle">
    <div class="detail-toolbar" role="group" aria-label="Управление размером текста в списке задач">
      <label for="statusFontRange" class="detail-toolbar-label">Размер текста</label>
      <input id="statusFontRange" class="detail-font-range" type="range" min="95" max="140" step="5" value="100" aria-label="Ползунок изменения размера текста в списке задач" oninput="setStatusScale(this.value / 100)">
      <span id="statusScaleValue" class="detail-scale-value">100%</span>
      <button type="button" class="detail-toolbar-close" aria-label="Закрыть окно" onclick="closeStatusModal()">×</button>
    </div>
    <div class="detail-scroll">
      <div id="statusModalTitle" class="status-modal-title"></div>
      <div id="statusModalList" class="status-modal-list"></div>
    </div>
  </div>
</div>


</div>

<div class="legend">
<span style="display:flex;align-items:center;gap:4px;"><span class="dot" style="background:#059669;"></span>Исполнено</span>
<span style="display:flex;align-items:center;gap:4px;"><span class="dot" style="background:#D97706;"></span>С нарушением</span>
<span style="display:flex;align-items:center;gap:4px;"><span class="dot" style="background:#2563EB;"></span>На исполнении</span>
<span style="display:flex;align-items:center;gap:4px;"><span class="dot" style="background:#DC2626;"></span>Не исполнено</span>
<span style="display:flex;align-items:center;gap:4px;"><span class="dot" style="border:1px solid #aaa;"></span>Не упомянуто</span>
</div>

<script src="meks_final_spaced.js"></script>
</div>
</body>
</html>
